version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - 'echo "📦 install 단계 시작"'
      - 'echo "Node.js version:"'
      - node -v
      - 'echo "npm version:"'
      - npm -v
      - npm ci

  pre_build:
    commands:
      - 'echo "🧪 pre_build 단계 시작"'
      - npm test

  build:
    commands:
      - 'echo "🛠️ React 빌드 시작"'
      - npm run build
      - 'echo "📁 dist 폴더 확인"'
      - ls -al dist
      - 'echo "🩺 health.html 확인"'
      - test -f dist/health.html

  post_build:
    commands:
      - 'echo "📦 CodeDeploy용 BuildArtifact 준비"'
      - chmod +x scripts/*.sh
      - 'echo "✅ BuildArtifact 준비 완료"'
      - 'echo "BuildArtifact에는 appspec.yml, scripts, dist가 포함되어야 합니다."'

artifacts:
  files:
    - appspec.yml
    - scripts/**/*
    - dist/**/*
  discard-paths: no

cache:
  paths:
    - "/root/.npm/**/*"