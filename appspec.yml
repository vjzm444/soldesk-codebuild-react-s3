version: 0.0
os: linux

files:
  - source: /dist
    destination: /usr/share/nginx/html
    overwrite: true

permissions:
  - object: /usr/share/nginx/html
    owner: nginx
    group: nginx
    mode: 755
    type:
      - directory
      - file

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 300
      runas: root

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: root